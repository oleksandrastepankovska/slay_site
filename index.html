<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nastya | Slay Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Montserrat", sans-serif;
        background-color: #fcfaff;
        color: #2d3748;
        scroll-behavior: smooth;
      }
      .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        text-align: center;
      }

      .slay-card-fixed {
        background: white;
        border-radius: 35px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
        border: 1px solid #f3ebff;
        margin: 30px 0;

        height: 250px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 30px;
        box-sizing: border-box;
      }

      .compliment-area {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100px;
      }

      .btn-slay {
        background: linear-gradient(135deg, #b794f4 0%, #9f7aea 100%);
        color: white;
        padding: 16px;
        border-radius: 20px;
        font-weight: 800;
        text-transform: uppercase;
        width: 100%;
        border: none;
        cursor: pointer;
        box-shadow: 0 8px 15px rgba(159, 122, 234, 0.25);
      }

      .future-vision {
        width: 100%;
        border-radius: 40px;
        box-shadow: 0 20px 50px rgba(159, 122, 234, 0.15);
        margin-top: 20px;
      }

      footer p {
        font-size: 9px;
        letter-spacing: 3px;
        color: #cbd5e0;
        text-transform: uppercase;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <audio id="click-sound" src="music.mp3"></audio>

    <div class="container min-h-screen flex flex-col justify-center">
      <header class="py-6">
        <div class="text-2xl mb-2">💅✨💜</div>
        <h1 class="text-4xl font-black text-gray-900 tracking-tight">
          Настя, ти - <span class="text-purple-500 italic">Slay!</span>
        </h1>
      </header>

      <div class="slay-card-fixed">
        <div class="compliment-area">
          <p
            id="compliment-text"
            class="text-lg font-bold text-gray-700 leading-tight transition-opacity duration-300"
          >
            Готова ловити вайб? 👇
          </p>
        </div>
        <button onclick="showCompliment()" class="btn-slay">
          Catch the vibe ✨
        </button>
      </div>

      <div class="mt-8 animate-bounce">
        <p
          class="text-[10px] font-black uppercase tracking-widest text-purple-300"
        >
          Горни вниз, щоб побачити майбутнє ✨🔮
        </p>
        <span class="text-xl text-purple-200">↓</span>
      </div>
    </div>

    <div class="container min-h-screen py-10 flex flex-col items-center">
      <div class="mb-6">
        <span
          class="inline-block bg-purple-50 text-purple-400 px-4 py-1 rounded-full text-[9px] font-black uppercase tracking-widest"
        >
          The Slay Destiny 💸
        </span>
      </div>

      <img src="slay_future.jpg" class="future-vision" alt="Vision" />

      <p
        class="mt-10 text-xl font-black italic text-gray-800 leading-tight px-4"
      >
        Ти зе бест. <br />
        <span class="text-purple-500 font-normal"
          >Просто продовжуй сяяти 💜</span
        >
      </p>

      <footer class="py-16 mt-auto">
        <p>SLAY • 2026 • PERIOD 💅</p>
      </footer>
    </div>

    <script>
      const compliments = [

        "Цей вайб просто unmatched! 🦄",

        "Твоя енергія робить цей світ яскравішим 🌟",
        "Ти - ікона стилю та щирості. Period! 💅💎",
        "Шакіра вже дзвонила, питала секрет твого успіху! 💃",
        "Твоя Ауді вже прогріває двигун! 🏎️",

        "Ти вмієш створювати навколо себе справжню магію. ✨🫂",
        "Маленькими кроками до великих мрій. Пишаюся тобою! 🥹💜",
        "Ти - джерело чистої, світлої енергії. Period! 🌸",
        "Твоя внутрішня сила захоплює і ламає всі стереотипи. 💪👑",
        "Світ крутиться навколо тих, хто сміливо йде вперед. Ти - попереду! 🌍🚀",
        "Ти заслуговуєш на всі діаманти та квіти цього світу! 💎💐",
        "Справжня, глибока і неймовірна. Твій вайб безцінний! 🦄",
        "Твій оверсинкінг офіційно заблоковано. Тільки чистий релакс! 🛑🧠",
        "Ти менеджерка не лише в IT, а й свого щасливого майбутнього! 🚀💻",
        "Твоя внутрішня дитина зараз аплодує твоїй сміливості! 👧🏼✨",
        "Ти - той самий світлий промінчик, який збирає навколо найкращих людей. 🫂❤️",
        "Пам'ятай: ти в себе одна, і ти проживаєш це життє на всі 100%! 🍷👑",

        "Твоя щирість - це суперсила, якої так бракує цьому світу. 🗺️💎",
        "Жоден NDA не в змозі приховати твій грандіозний успіх! 🤫💸",

        "Ти заслуговуєш на те, щоб насолоджуватися тишею і спокоєм. 🧘🏼‍♀️🍃",
        "Для твоїх мрій немає жодних лімітів та обмежень! 📈🚀",
        "Ти - уособлення 'Girl Power' та незалежності. ✨👩🏼‍💻",
        "Твій вайб заряджає краще за будь-яку каву. ☕🔥",
        "Просто нагадую: ти неймовірна. Прямо зараз, цієї секунди. 🫶🏼✨",
        "Всесвіт готує для тебе щось неймовірно масштабне! 🌌👑",
        "Ти керуєш трендами свого життя, ніхто інший! 💅📋",
        "Твоя краса йде зсередини, і це найтепліше світло. ☀️💛",
        "Пишайся собою, бо ти створила себе сама! 🛠️👑",
        "Більше ніяких побитих колін, тепер тільки політ! 🕊️✨",
      ];

      function showCompliment() {
        const textEl = document.getElementById("compliment-text");
        const clickSound = document.getElementById("click-sound");
        const random =
          compliments[Math.floor(Math.random() * compliments.length)];

        if (clickSound) {
          clickSound.currentTime = 0;
          clickSound.volume = 0.5;
          clickSound.play().catch(() => {});
        }

        // Плавна зміна тексту компліменту
        textEl.style.opacity = 0;
        setTimeout(() => {
          textEl.innerText = random;
          textEl.style.opacity = 1;
        }, 250);
      }
    </script>
  </body>
</html>
